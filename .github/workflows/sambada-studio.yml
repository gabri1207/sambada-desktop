name: SAMBADA Studio — downloadable executables

# Builds the standalone executables (macOS / Windows / Linux) and publishes them.
# - Manual trigger: Actions tab -> "Run workflow".
# - On a "studio-vX.Y" tag: also publishes a Release with the 3 downloadable archives.

on:
  workflow_dispatch:
  push:
    tags: ['studio-v*']

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- macOS
  macos:
    name: macOS (.app)
    runs-on: macos-13          # Intel -> compatible with Intel AND Apple Silicon (via Rosetta)
    steps:
      - uses: actions/checkout@v4
      - name: Build tools
        run: brew install gcc cmake
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build the SAMBADA binaries
        run: bash sambada-gui/build/build-macos.sh
      - name: Package the application
        run: |
          python -m pip install --upgrade pip pyinstaller pywebview
          cd sambada-gui
          pyinstaller --noconfirm --clean --distpath dist --workpath build/pyi packaging/SambadaStudio.spec
          cd dist && ditto -c -k --sequesterRsrc --keepParent "SAMBADA Studio.app" SAMBADA-Studio-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: SAMBADA-Studio-macOS
          path: sambada-gui/dist/SAMBADA-Studio-macOS.zip
          if-no-files-found: error

  # ---------------------------------------------------------------- Linux
  linux:
    name: Linux (binary)
    runs-on: ubuntu-22.04      # glibc 2.35 -> broad compatibility
    steps:
      - uses: actions/checkout@v4
      - name: Build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build the SAMBADA binaries
        run: bash sambada-gui/build/build-linux.sh
      - name: Package the application
        run: |
          python -m pip install --upgrade pip pyinstaller pywebview
          cd sambada-gui
          pyinstaller --noconfirm --clean --distpath dist --workpath build/pyi packaging/SambadaStudio.spec
          cd dist && chmod +x SambadaStudio && tar czf SAMBADA-Studio-Linux.tar.gz SambadaStudio
      - uses: actions/upload-artifact@v4
        with:
          name: SAMBADA-Studio-Linux
          path: sambada-gui/dist/SAMBADA-Studio-Linux.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows
  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: MinGW toolchain (gcc + cmake + ninja)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
      - name: Build the SAMBADA binaries
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          rm -rf build-gui && mkdir build-gui && cd build-gui
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libstdc++ -static-libgcc"
          cmake --build . -j4 --target sambada supervision recode-plink recode-plink-lfmm
          mkdir -p ../sambada-gui/bin/windows
          cp binaries/*.exe ../sambada-gui/bin/windows/
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Package the application
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pyinstaller pywebview
          cd sambada-gui
          pyinstaller --noconfirm --clean --distpath dist --workpath build/pyi packaging/SambadaStudio.spec
          Compress-Archive -Force -Path dist/SambadaStudio.exe -DestinationPath dist/SAMBADA-Studio-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: SAMBADA-Studio-Windows
          path: sambada-gui/dist/SAMBADA-Studio-Windows.zip
          if-no-files-found: error

  # ---------------------------------------------------------------- Release (on tag)
  release:
    name: Publish the Release
    # Linux is not required so a Linux-only failure cannot block the Windows/macOS release.
    # The Linux archive is still included in the Release when its job succeeds in time.
    needs: [macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/studio-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Create/update the Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            Standalone executables of **SAMBADA Studio** (no installation required).
            - **macOS**: `SAMBADA-Studio-macOS.zip` (unzip, then right-click -> Open)
            - **Windows**: `SAMBADA-Studio-Windows.zip` (unzip, run `SambadaStudio.exe`)
            - **Linux**: `SAMBADA-Studio-Linux.tar.gz` (extract, `chmod +x`, run)
